version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama_data:/root/.ollama
      - ./models:/models
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=5m
    ports:
      - "11434:11434"
    command: serve
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  backend:
    build: ./backend
    container_name: ai-backend
    environment:
      - OLLAMA_HOST=ollama
      - MODEL_NAME=llama3.2:7b
      - MODEL_TEMPERATURE=0.0
      - MODEL_SEED=40
      - LOG_LEVEL=INFO
      - CACHE_ENABLED=true
      - ENABLE_ACCURACY_SCORING=true
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      - ./backend:/app
      - ./cache:/app/cache
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000/ws
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
